<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目展示中心 · Project Showcase</title>
    <meta name="description" content="一个静态项目展示与文档站点，托管在 Cloudflare Pages。">
    <link rel="stylesheet" href="/assets/base.css">
    <!--
      门户首页 / Portal home
      ------------------------------------------------------------
      这是整站的入口，作用是用卡片列出所有项目，每张卡片链接到
      projects/<项目名>/ 下的展示页。

      ▶ 新增项目时：复制下面 "项目卡片" 区块里的一张 .card，
        修改标题、描述与 href，指向你的新项目目录即可。
      ▶ 单个项目页面请基于 /templates/project.html 制作，
        详见 README.md 与 AGENTS.md。
    -->
</head>
<body>
    <div class="container">
        <header>
            <span class="badge">✨ Project Showcase</span>
            <h1>项目展示中心</h1>
            <p class="subtitle">
                这里集中展示各个项目的在线演示与文档。所有页面共享统一的设计风格，
                随 GitHub 自动部署，永远是最新版本。
            </p>
            <div class="cta-group">
                <a href="https://github.com/asashiki/doc" class="btn btn-outline" target="_blank" rel="noopener">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 2-.27 7.64 7.64 0 0 1 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
                    GitHub 仓库
                </a>
                <a href="#projects" class="btn btn-primary">浏览项目</a>
            </div>
        </header>

        <!-- ============ 项目卡片 / Project cards ============
             复制一张 <a class="card"> 即可新增一个项目。
             暂无项目时，保留下面这张占位卡片即可。 -->
        <section class="grid" id="projects">
            <a class="card" href="#" aria-disabled="true">
                <h3>📦 示例项目（占位）</h3>
                <p>这是一张占位卡片。把它复制一份，改成你的项目标题与简介，
                   并把 href 指向 <code>/projects/你的项目/</code>。</p>
                <span class="card-link">查看演示 →</span>
            </a>
        </section>
    </div>

    <footer>
        <p>静态站点 · 托管在 Cloudflare Pages · 源码见
            <a href="https://github.com/asashiki/doc" target="_blank" rel="noopener">asashiki/doc</a>
        </p>
    </footer>
</body>
</html>
