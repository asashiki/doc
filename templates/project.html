<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TODO: 改成你的项目名 -->
    <title>项目名称 · 在线演示</title>
    <!-- TODO: 一句话描述，用于搜索引擎与分享预览 -->
    <meta name="description" content="一句话描述你的项目。">

    <!--
      单个项目展示页模板 / Single-project showcase template
      ============================================================
      使用方法：
        1. 把本文件复制到  /projects/<你的项目名>/index.html
        2. 全文搜索 “TODO”，逐项替换为真实内容
        3. 在根目录 /index.html 的项目卡片区新增一张卡片，
           href 指向 /projects/<你的项目名>/
        4. 本页样式来自共享的 /assets/base.css —— 注意下面用的是
           绝对路径 “/assets/base.css”，所以放在任意层级目录都能正确加载。
           如需新增样式，优先加到 base.css；仅本页特有的小调整可写在
           下方 <style> 里。
      详见仓库根目录的 README.md 与 AGENTS.md。
    -->
    <link rel="stylesheet" href="/assets/base.css">
    <style>
        /* 仅本页特有的样式可写在这里（可留空） */
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="badge">✨ 在线演示</span>
            <!-- TODO: 项目名 -->
            <h1>你的项目名称</h1>
            <!-- TODO: 项目简介 -->
            <p class="subtitle">
                一句话描述你的项目：它解决什么问题、有什么亮点。
            </p>
            <div class="cta-group">
                <!-- TODO: 替换为该项目的源码仓库地址 -->
                <a href="https://github.com/asashiki/你的仓库" class="btn btn-outline" target="_blank" rel="noopener">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 2-.27 7.64 7.64 0 0 1 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
                    GitHub 仓库
                </a>
                <a href="#demo" class="btn btn-primary">查看演示</a>
                <a href="/" class="btn btn-outline">← 返回展示中心</a>
            </div>
        </header>

        <!-- 特性卡片：按需增删 / Feature cards: add or remove freely -->
        <section class="grid">
            <div class="card">
                <h3>🚀 特性一</h3>
                <p>描述该特性的优势，让访客一眼就能看出项目的价值。</p>
            </div>
            <div class="card">
                <h3>🛡️ 特性二</h3>
                <p>你可以随意增删卡片，也可以换成动图、代码块等。</p>
            </div>
            <div class="card">
                <h3>🎨 特性三</h3>
                <p>展示页会自动跟随 GitHub 更新，永远是最新的内容。</p>
            </div>
        </section>

        <!-- 演示区 / Demo area -->
        <section class="panel" id="demo">
            <h2>实时演示</h2>
            <p>这里可以嵌入实际应用界面、交互组件或动画。</p>
            <div class="placeholder">
                <p>🖼️ 把你的演示内容放在这里</p>
                <p style="font-size:0.85rem; margin-top:0.5rem;">（例如：iframe、动图、截图对比 slider 等）</p>
            </div>
        </section>
    </div>

    <footer>
        <!-- TODO: 替换项目名与链接 -->
        <p>由 <a href="https://github.com/asashiki/你的仓库" target="_blank" rel="noopener">你的项目</a>
           驱动 · <a href="/">返回展示中心</a> · 托管在 Cloudflare Pages</p>
    </footer>
</body>
</html>
